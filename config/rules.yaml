    folder: 'Совещание по Маркетингу'

  - pattern: 'Совещание\s+по\s+БП\s+Реализация'
    canonical_name: 'Совещание по БП Реализация'
    folder: 'Совещание по БП Реализация'

  - pattern: 'Совещание\s+по\s+БП\s+Продажи'
    canonical_name: 'Совещание по БП Продажи'
    folder: 'Совещание по БП Продажи'

  - pattern: 'Совещание\s+по\s+Лиду\s*(?:№|#)?\s*\d+'
